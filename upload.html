<!DOCTYPE html>
<html lang="en">
<head>
    <title>Upload</title>
 
    
    <style>
      *,
*:before,
*:after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background-color: #040404;
}
.background{
    width: 430px;
    height: 520px;
    position: absolute;
    transform: translate(-50%,-50%);
    left: 50%;
    top: 50%;
}
.background .shape{
    height: 200px;
    width: 200px;
    position: absolute;
    border-radius: 50%;
}
.shape:first-child{
    background: linear-gradient(
        #1845ad,
        #23a2f6
    );
    left: -80px;
    top: -80px;
}
.shape:last-child{
    background: linear-gradient(
        to right,
        #ff512f,
        #f09819
    );
    right: -30px;
    bottom: -80px;
}
form{
    height: 520px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 50px 35px;
}
form *{
    font-family: 'Poppins',sans-serif;
    color: #0a0a0a;
    letter-spacing: 0.5px;
    outline: none;
    border: none;
}
form h1{
    color: aqua;
    font-size: 32px;
    font-weight: 500;
    line-height: 42px;
    text-align: center;
}

label{
    display: block;
    margin-top: 30px;
    font-size: 16px;
    font-weight: 500;
}
input{
    display: block;
    height: 50px;
    width: 100%;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
.header {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        width:100%;
        height: 300px;
        position:relative;
    }
    .menu-container {
        position: absolute;
        top: 0;
        right: 0;
        margin-top: 50px;
    }
    .menu {
        text-decoration: none;
        color: rgb(7, 7, 7);
        background-color: rgb(209, 179, 179);
        padding: 25px;
        border-radius: 10px;
        margin-right: 10px;
    }
        .menu:hover {
        background-color: rgb(203, 207, 121);
        color: black;
        padding: 30px;
    }
        .login-container {
            margin-top: 50px;
        }
        button{
            margin-top: 50px;
            align-items: center;
            background: #121111;
            display: block;
            padding: 5px 15px;
            border-radius: 5px;
            border: 2px solid #f0eded;
        }
        button:hover {
        box-shadow: 0 2px 0 #efeeee, 0 2px 0px 2px #08f414;
        }
         button:active {
         top: 4px;
         padding-bottom: 0px;
         box-shadow: 0 1px 0 #000;
        }
        button {
         position: relative;
         float: left;
         font: normal 22px/25px "Patrick Hand", sans-serif;
         margin-right: 10px;
         text-transform: uppercase;
         color: #fafafa;
         text-decoration: none;
         padding-bottom: 3px;
         border-radius: 5px;
         box-shadow: 0 2px 0 #000;
         transition: padding 0.1s, box-shadow 0.1s, top 0.1s;
        }
    .text-box{
            color: #fefefe; 
            position: centre;
            bottom: 8%;
        }
        .text-box p {
            font-size: 50px;
            font-weight: 600;
        }
        .text-box h2{
            font-size: 190px;
            line-height: 160px;
            margin-left: 30px;
            color: transparent;
            -webkit-text-stroke: 1px #fff;
            background: url(static/home,png.jpg);
            -webkit-background-clip: text;
            background-position: 0 0;
            animation: back 4s linear infinite;
        }
        @keyframes back {
            100%{
                background-position: 200px 0;
            }
        }
        .text-box h3{
            font-size: 40px;
            font-weight: 500;
            margin-left: 70px;
        }
        label{
            color:whitesmoke;
        }

     </style>
</head>
<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class = "header">
     <div class="menu-container">
        <a class = "menu" href = "/"> Home </a>
        <a class = "menu" href = "/login"> Login </a> 
        <a class = "menu" href = "/upload"> Upload </a>
     </div>
    </div>
    <div class="text-box">
        <p> Wanna</p>
        <h2> make </h2>
        <h3>predict.</h3>
     </div>
    <centre>
        <form action="/read_data" method="post" enctype="multipart/form-data">
        <div class="login-container">
            <h1> Upload Form</h1>
            <label> Choose the file:</label>
            <br/><br/>
            <input type="file" name="file"  id="file" required/>
            <br/><br/>

            <button value ="upload">Submit</button>
            
        </div>
        </form>
    </centre>
</body>
</html>
